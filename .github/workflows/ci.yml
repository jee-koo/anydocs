name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  AUDIT_SERVER: " https://api.sguard.top"      # 修改1：添加环境变量 安全审计平台api节点url
  PROJECT_NAME: "${{ github.repository }}"     # 修改2：添加环境变量 审计报告唯一标识

jobs:
  security-audit:                              # 修改3：添加审计JOB，名称:security-audit
    name: "🔍 代码安全审计"
    runs-on: [self-hosted, audit-machine]  
    timeout-minutes: 180  # 设置3小时超时
    
    steps:
    - name: "📥 检出代码"
      uses: actions/checkout@v4
        
    - name: "⚡ 执行安全扫描"
      run: |
        echo "开始执行SAST扫描..."
        # 运行 Semgrep 扫描
        SEMGREP_REDACT_CODE=true semgrep scan --config auto . 2>&1 | tee semgrep_report.txt
        
    - name: "📤 上传扫描结果"
      run: |
        echo "上传扫描结果..."
        curl -X POST "$AUDIT_SERVER/upload-and-audit/" \
          -F "file=@semgrep_report.txt" \
          -F "additional_param=$PROJECT_NAME" \
          -o uploadResponse.json
        UPLOAD_RESPONSE=$(cat uploadResponse.json)
        echo "semgrep上传文件api返回内容: $UPLOAD_RESPONSE"  
        
    - name: "⏳ 轮询审计结果"
      id: audit-result
      run: |
        echo "轮询审计结果..."
        
        for i in {1..100}; do
          echo "第 $i 次轮询..."
          
          curl -X POST "$AUDIT_SERVER/audit-status/" \
            -F "task_id=$PROJECT_NAME" \
            -o auditResponse.json
            
          AUDIT_RESPONSE=$(cat auditResponse.json)
          echo "审计结果状态: $AUDIT_RESPONSE"
          
          STATUS=$(jq -r '.status // "error"' auditResponse.json 2>/dev/null || echo "error")
          
          if [ "$STATUS" = "completed" ]; then
            echo "✅ 审计通过"
            exit 0
          elif [ "$STATUS" = "failed" ]; then
            echo "❌ 审计失败"
            exit 1     # 模拟审核成功，正常使用这里值应为1，审核失败
          fi
          
          sleep 60
        done
        echo "❌ 轮询超时"
        exit 1

  quality:
    name: Quality 
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-audit                               # 修改4：添加 依赖安全审计作业
    if: needs.security-audit.result == 'success'        # 修改5：添加 只有审计成功才继续执行

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  acceptance:
    name: Acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @anydocs/web exec playwright install --with-deps chromium

      - name: Run Playwright P0 acceptance suite
        run: pnpm --filter @anydocs/web test:e2e:p0

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            packages/web/playwright-report
            packages/web/test-results
          if-no-files-found: ignore
